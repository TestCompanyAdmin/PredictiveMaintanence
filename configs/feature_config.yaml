windowing:
  window_size_seconds: 60
  step_size_seconds: 30

features:
  statistical:
    - mean
    - std
    - min
    - max
    - rms
    - slope
    - sample_count
    - zscore_mean

  quality:
    - invalid_ratio
    - missing_ratio
    - out_of_range_ratio
    - duplicate_ratio
    - sampling_mismatch_ratio
    - validated_sample_count

sensor_groups:
  vibration:
    - vibration_x
    - vibration_y

  temperature:
    - temp_motor

  pressure:
    - pressure_inlet

  rotation:
    - rpm_motor